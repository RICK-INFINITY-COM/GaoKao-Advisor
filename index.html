<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AI 对话助手</title>
<style>
:root{--p:#2563eb;--pl:#eff6ff;--t:#1e293b;--s:#64748b;--bg:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f1f5f9;display:flex;justify-content:center;min-height:100dvh}
.app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;background:#fff;overflow:hidden}
.header{background:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f1f5f9;z-index:10}
.header .brand{flex:1}
.header .brand h2{font-size:16px;font-weight:700;color:var(--t)}
.header .brand p{font-size:11px;color:var(--s)}
.header .gear{width:40px;height:40px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#64748b}
.header .gear:active{background:#eff6ff;transform:scale(.92)}
.header .new-chat{width:40px;height:40px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#64748b;margin-right:8px}
.header .new-chat:active{background:#eff6ff;transform:scale(.92)}
.chat{flex:1;overflow-y:auto;padding:16px 14px;background:var(--bg);scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:20px}
.msg{margin-bottom:14px;max-width:84%;clear:both;animation:up .3s}
.msg.bot{float:left}.msg.user{float:right}
.msg .bubble{padding:12px 15px;border-radius:18px;font-size:14.5px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.msg.bot .bubble{background:#fff;color:var(--t);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #f1f5f9}
.msg.user .bubble{background:var(--p);color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 12px rgba(37,99,235,.2)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.typing-wrap{display:inline-flex;align-items:center;padding:4px 0;gap:5px}
.typing-wrap span{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:wave 1.2s infinite}
.typing-wrap span:nth-child(2){animation-delay:.15s}
.typing-wrap span:nth-child(3){animation-delay:.3s}
@keyframes wave{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-6px);opacity:1}}
.wait-hint{clear:both;text-align:center;font-size:12px;color:#a0aec0;padding:6px;margin-top:8px}
.kb-tag{clear:both;text-align:center;font-size:10px;color:#94a3b8;padding:2px;margin-top:2px}
.input-bar{display:flex;padding:10px 14px 14px;background:#fff;border-top:1px solid #f1f5f9;gap:10px;box-shadow:0 -2px 12px rgba(0,0,0,.03)}
.input-bar input{flex:1;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:24px;font-size:14px;outline:none;background:#f8fafc;font-family:inherit;transition:all .2s}
.input-bar input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.input-bar .send{width:44px;height:44px;border-radius:50%;background:var(--p);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(37,99,235,.25);transition:all .15s;color:#fff;font-size:18px}
.input-bar .send:active{transform:scale(.9)}
.input-bar .send:disabled{background:#cbd5e1;box-shadow:none}
.sheet{display:none;position:fixed;inset:0;z-index:100;justify-content:center;align-items:flex-end}
.sheet.on{display:flex}
.sheet-bg{position:absolute;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px)}
.sheet-card{position:relative;background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 34px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.1);animation:sheetUp .35s ease-out}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:32px;height:4px;border-radius:20px;background:#e2e8f0;margin:0 auto 18px}
.sheet h3{font-size:18px;font-weight:800;margin-bottom:12px;color:var(--t)}
.section{margin:12px 0;text-align:left}
.section label{font-size:11px;font-weight:700;color:#94a3b8;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.section input{width:100%;padding:12px 15px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14px;outline:none;font-family:inherit}
.section input:focus{border-color:var(--p)}
.section .hint{font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.5}
.section .hint a{color:var(--p)}
.btn{display:block;width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin:8px 0;transition:.15s}
.btn-p{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.2)}
.btn-p:active{background:#1e40af;transform:scale(.98)}
.btn-o{background:#fff;color:var(--p);border:1.5px solid var(--p)}
.btn-g{background:transparent;color:#94a3b8}
</style>
</head><body>
<div class="app">

<div class="header">
  <div class="brand">
    <h2>AI 对话助手</h2>
    <p>本地部署 · 私有</p>
  </div>
  <div class="new-chat" onclick="newChat()" title="新对话">✚</div>
  <div class="gear" onclick="openSheet()">&#9881;</div>
</div>

<div class="chat" id="chatBox">
  <div class="msg bot"><div class="bubble">你好！我是 AI 对话助手。
点击右上角设置图标，填入你的 DeepSeek API Key 即可开始对话。</div></div>
</div>

<div class="input-bar">
  <input id="msgInput" placeholder="输入你的问题..." onkeydown="if(event.keyCode==13)send()" autocomplete="off">
  <button class="send" onclick="send()" id="sendBtn">➤</button>
</div>
</div>

<!-- === 设置面板：只有一个 API Key 输入框 === -->
<div class="sheet" id="sheet">
<div class="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet-card">
  <div class="sheet-handle"></div>
  <h3>设置</h3>

  <div class="section">
    <label>DeepSeek API Key</label>
    <input type="password" id="keyInput" placeholder="sk-..." autocomplete="off">
    <div class="hint">Key 仅保存在你浏览器本地，不上传任何服务器。<br>去 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取</div>
  </div>

  <button class="btn btn-p" onclick="saveKey()">保存</button>
  <button class="btn btn-g" onclick="clearKey()">清空</button>

  <button class="btn btn-g" onclick="closeSheet()" style="margin-top:16px">关闭</button>
</div>
</div>

<script>
var API = window.location.origin;
var sessionId = String(Date.now());
var ownKey = "";
try { ownKey = localStorage.getItem("ai_key") || ""; } catch(e) {}

function openSheet() {
  document.getElementById("keyInput").value = ownKey;
  document.getElementById("sheet").classList.add("on");
}
function closeSheet() { document.getElementById("sheet").classList.remove("on"); }

function saveKey() {
  ownKey = document.getElementById("keyInput").value.trim();
  try {
    if (ownKey) localStorage.setItem("ai_key", ownKey);
    else localStorage.removeItem("ai_key");
  } catch(e) {}
  closeSheet();
  addBotMsg(ownKey ? "API Key 已保存，可以开始对话了。" : "已清空 Key。");
}

function clearKey() {
  ownKey = "";
  try { localStorage.removeItem("ai_key"); } catch(e) {}
  document.getElementById("keyInput").value = "";
  addBotMsg("已清空 Key。");
  closeSheet();
}

function newChat() {
  sessionId = String(Date.now());
  document.getElementById("chatBox").innerHTML = '<div class="msg bot"><div class="bubble">新对话已开始，上下文已清空。</div></div>';
  fetch(API + "/api/session/" + sessionId, {method:"DELETE"}).catch(function(){});
}

var typingEl = null, waitTimer = null;
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement("div");
  typingEl.className = "msg bot";
  typingEl.innerHTML = '<div class="bubble"><div class="typing-wrap"><span></span><span></span><span></span></div></div>';
  document.getElementById("chatBox").appendChild(typingEl);
  typingEl.scrollIntoView({behavior:"smooth"});
  waitTimer = setTimeout(function(){
    if (typingEl) {
      var hint = document.createElement("div");
      hint.className = "wait-hint";
      hint.textContent = "回答内容较长，请稍候~";
      document.getElementById("chatBox").appendChild(hint);
      hint.scrollIntoView({behavior:"smooth"});
    }
  }, 3000);
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
  if (waitTimer) { clearTimeout(waitTimer); waitTimer = null; }
  document.querySelectorAll(".wait-hint").forEach(function(h){ h.remove(); });
}

function send() {
  var inp = document.getElementById("msgInput");
  var btn = document.getElementById("sendBtn");
  var msg = inp.value.trim();
  if (!msg || btn.disabled) return;
  addMsg(msg, "user");
  inp.value = "";
  btn.disabled = true;
  showTyping();
  fetch(API + "/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg, session_id:sessionId, user_api_key:ownKey})
  }).then(function(r){return r.json()}).then(function(d){
    hideTyping();
    btn.disabled = false;
    addBotMsg(d.reply || "（无回复，请重试）");
    if (d.kb_hit) {
      var tag = document.createElement("div");
      tag.className = "kb-tag";
      tag.textContent = "已参考本地知识库数据";
      document.getElementById("chatBox").appendChild(tag);
      tag.scrollIntoView({behavior:"smooth"});
    }
  }).catch(function(){
    hideTyping();
    btn.disabled = false;
    addBotMsg("网络异常，请重试");
  });
}

function addMsg(text, role) {
  text = text.replace(/\*\*/g, "");
  var d = document.createElement("div");
  d.className = "msg " + role;
  d.innerHTML = '<div class="bubble">' + text.replace(/\n/g,"<br>") + "</div>";
  document.getElementById("chatBox").appendChild(d);
  d.scrollIntoView({behavior:"smooth"});
}
function addBotMsg(t) { addMsg(t, "bot"); }
</script>
</body></html>
